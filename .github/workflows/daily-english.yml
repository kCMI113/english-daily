name: Daily English Study Email

on:
  schedule:
    # UTC 22:00 = KST 07:00 (next day)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date override (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  send-daily-english:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily English study
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m src.main "${{ github.event.inputs.date }}"
          else
            python -m src.main
          fi

      - name: Commit updated history
        run: |
          git config user.name "english-daily-bot"
          git config user.email "bot@english-daily.local"
          git add data/history.json data/content_log.json docs/
          git diff --staged --quiet || git commit -m "Update study history - $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
